name: Publish caddy-cloudflare

on:
  push:
    tags:
      - "caddy-cloudflare-v*"

  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, e.g. caddy-cloudflare-v2.10.2-cf0.2.1-r1"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/caddy-cloudflare
  CACHE_SCOPE: caddy-cloudflare-amd64

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Build and test (linux/amd64)
    runs-on: ubuntu-latest

    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Load versions and validate release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          set -a
          source versions.env
          set +a

          cf_clean="${CADDY_DNS_CLOUDFLARE_VERSION#v}"
          image_tag="${CADDY_VERSION}-cf${cf_clean}-${IMAGE_REVISION}"
          expected_tag="caddy-cloudflare-v${image_tag}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.release_tag }}"
          else
            release_tag="${GITHUB_REF#refs/tags/}"
          fi

          git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null

          if [ "$release_tag" != "$expected_tag" ]; then
            echo "::error::Release tag '${release_tag}' does not match expected '${expected_tag}'"
            exit 1
          fi

          echo "caddy_version=${CADDY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "cf_version=${CADDY_DNS_CLOUDFLARE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local test image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: caddy-cloudflare:test
          build-args: |
            CADDY_VERSION=${{ steps.release.outputs.caddy_version }}
            CADDY_DNS_CLOUDFLARE_VERSION=${{ steps.release.outputs.cf_version }}
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}

      - name: Assert Cloudflare DNS module
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm caddy-cloudflare:test \
            caddy list-modules |
            grep -qFx dns.providers.cloudflare

  publish:
    name: Publish (linux/amd64)
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Load versions and validate release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          set -a
          source versions.env
          set +a

          cf_clean="${CADDY_DNS_CLOUDFLARE_VERSION#v}"
          image_tag="${CADDY_VERSION}-cf${cf_clean}-${IMAGE_REVISION}"
          expected_tag="caddy-cloudflare-v${image_tag}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.release_tag }}"
          else
            release_tag="${GITHUB_REF#refs/tags/}"
          fi

          git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null

          if [ "$release_tag" != "$expected_tag" ]; then
            echo "::error::Release tag '${release_tag}' does not match expected '${expected_tag}'"
            exit 1
          fi

          echo "caddy_version=${CADDY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "cf_version=${CADDY_DNS_CLOUDFLARE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: mode=max
          build-args: |
            CADDY_VERSION=${{ steps.release.outputs.caddy_version }}
            CADDY_DNS_CLOUDFLARE_VERSION=${{ steps.release.outputs.cf_version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.release.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.release.outputs.source_sha }}
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}
